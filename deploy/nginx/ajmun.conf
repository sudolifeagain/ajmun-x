# ajmun37.re4lity.com — nginx reverse proxy (origin behind Cloudflare)
#
# このファイルがリポジトリの正本です。デプロイ時に deploy/nginx/install-nginx-config.sh
# が /etc/nginx/conf.d/ajmun.conf へ配置し、nginx -t 検証後にリロードします。
#
# セキュリティヘッダはアプリ（next.config.ts + proxy.ts）が唯一の発生源です。
# ここで add_header を設定すると、アプリのヘッダと重複・矛盾するため設定しません。
#   - X-Frame-Options: DENY        (next.config.ts)
#   - X-Content-Type-Options: nosniff (next.config.ts)
#   - Referrer-Policy, HSTS, Permissions-Policy 等 (next.config.ts)
#   - Content-Security-Policy (proxy.ts / nonce 方式)
# 過去に nginx 側で SAMEORIGIN / X-XSS-Protection を上乗せして重複していた問題の再発防止。

server {
    listen 80;
    server_name ajmun37.re4lity.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ajmun37.re4lity.com;

    ssl_certificate /etc/nginx/ssl/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-origin.key;

    # --- Authenticated Origin Pulls (mTLS) — Cloudflare 以外を拒否 ---
    # Cloudflare がオリジンプル時に提示するクライアント証明書を、Cloudflare の
    # origin-pull CA で検証する。これによりオリジン IP への直接アクセス
    # （Cloudflare の WAF / Access バイパス）を遮断する。
    #
    # 安全な有効化は2段階（順序を誤るとサイト停止）:
    #   1) Cloudflare ダッシュボードで zone-level AOP を有効化
    #      SSL/TLS → Origin Server → Authenticated Origin Pulls → On
    #      （Cloudflare が origin-pull クライアント証明書を提示し始める）
    #   2) 上記を確認した「後で」 ssl_verify_client を optional → on に変更し
    #      Cloudflare の証明書が無い接続を拒否する。
    #   ※ 1 の前に on にすると Cloudflare の正規リクエストも拒否され停止する。
    ssl_client_certificate /etc/nginx/ssl/cloudflare-origin-pull-ca.pem;
    ssl_verify_client optional;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
